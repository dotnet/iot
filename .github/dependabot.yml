# Dependabot configuration for the dotnet/iot repository.
#
# All NuGet projects across the repo (except /eng/common, which is
# Arcade-maintained) are scanned by a single update block. Minor and patch
# bumps are bundled into a single weekly PR; major bumps fall out as
# individual PRs so breaking-change risk can be evaluated in isolation.
#
# Arcade packages (Microsoft.DotNet.*) are ignored entirely — those SDKs
# are updated outside of Dependabot via the standard Arcade flow.
version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/**"
      - "!/eng/common/**"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "Microsoft.DotNet.*"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
