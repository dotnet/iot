# Dependabot configuration for the dotnet/iot repository.
#
# All NuGet projects across samples, tests, and tools are scanned by a single
# update block using the `directories:` (plural) field. Updates are bundled
# into a small number of grouped PRs instead of one PR per package per folder.
#
# Grouping strategy:
#   - arcade            -> Microsoft.DotNet.* and Microsoft.Build.Traversal
#                          (always released together as part of Arcade).
#   - dotnet-runtime    -> System.* and Microsoft.Extensions.* packages
#                          (shipped together as part of the .NET release train).
#   - xunit             -> xunit and its runners/analyzers.
#   - skiasharp         -> SkiaSharp and its native asset packages.
#   - other-minor-patch -> catch-all for any remaining minor/patch updates.
#
# Major version bumps are intentionally NOT grouped: they get their own PRs
# so breaking-change risk can be evaluated individually.
version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/**"
      - "!/eng/common/**"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 10
    groups:
      arcade:
        patterns:
          - "Microsoft.DotNet.*"
          - "Microsoft.Build.Traversal"
        update-types:
          - "minor"
          - "patch"
      dotnet-runtime:
        patterns:
          - "System.*"
          - "Microsoft.Extensions.*"
        update-types:
          - "minor"
          - "patch"
      xunit:
        patterns:
          - "xunit"
          - "xunit.*"
        update-types:
          - "minor"
          - "patch"
      skiasharp:
        patterns:
          - "SkiaSharp"
          - "SkiaSharp.*"
        update-types:
          - "minor"
          - "patch"
      other-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "Microsoft.DotNet.*"
          - "Microsoft.Build.Traversal"
          - "System.*"
          - "Microsoft.Extensions.*"
          - "xunit"
          - "xunit.*"
          - "SkiaSharp"
          - "SkiaSharp.*"
        update-types:
          - "minor"
          - "patch"
